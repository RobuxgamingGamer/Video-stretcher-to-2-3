<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stretched Video 2:3</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
  }

  #videoContainer {
    width: 400px;    /* desired width */
    height: 600px;   /* 2:3 ratio */
    overflow: hidden;
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  video {
    /* force it to stretch regardless of original aspect ratio */
    width: 100% !important;
    height: 100% !important;
  }

  button {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
  }

  input[type="file"] {
    margin-bottom: 20px;
  }
</style>
</head>
<body>

<h1>Stretched Video 2:3 Player</h1>

<input type="file" id="videoInput" accept="video/*">
<div id="videoContainer">
  <video id="video" controls></video>
</div>
<button id="playPause">Play/Pause</button>

<script>
  const videoInput = document.getElementById('videoInput');
  const video = document.getElementById('video');
  const playPauseBtn = document.getElementById('playPause');

  videoInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if(file){
      const url = URL.createObjectURL(file);
      video.src = url;
      video.load();
      video.style.width = "100%";
      video.style.height = "100%"; // force stretch
    }
  });

  playPauseBtn.addEventListener('click', () => {
    if(video.paused){
      video.play();
      playPauseBtn.textContent = 'Pause';
    } else {
      video.pause();
      playPauseBtn.textContent = 'Play';
    }
  });
</script>

</body>
</html>
