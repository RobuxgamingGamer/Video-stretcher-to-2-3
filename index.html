<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2:3 Video Stretcher Player</title>

<meta name="description" content="Free browser tool to stretch videos to 2:3 ratio and play them instantly. Upload any video and watch it stretched.">

<meta name="keywords" content="video stretcher, stretch video 2:3, online video player, video distortion tool">

<meta name="robots" content="index, follow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
  padding-top:40px;
}

canvas{
  width:400px;
  height:600px;
  background:black;
  display:block;
  margin:auto;
  border-radius:10px;
}

button,input{
  margin-top:15px;
  font-size:16px;
  padding:8px 15px;
}
</style>
</head>

<body>

<h2>2:3 Stretch Video Player</h2>

<input type="file" id="videoInput" accept="video/*"><br>
<canvas id="canvas"></canvas><br>
<button id="playPause">Play / Pause</button>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = 400;
canvas.height = 600;

const video = document.createElement("video");
video.playsInline = true;
video.controls = false;

let animationRunning = false;

document.getElementById("videoInput").addEventListener("change", e => {

  const file = e.target.files[0];
  if(!file) return;

  const url = URL.createObjectURL(file);
  video.src = url;
  video.load();

});

function draw(){

  if(!animationRunning) return;

  ctx.drawImage(video,0,0,canvas.width,canvas.height);

  requestAnimationFrame(draw);
}

document.getElementById("playPause").onclick = () => {

  if(video.paused){

    video.play();
    animationRunning = true;
    draw();

  }else{

    video.pause();
    animationRunning = false;

  }

};
</script>

</body>
</html>
